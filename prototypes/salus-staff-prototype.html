<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Salus Market — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital@1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===================================================================
     SALUS MARKET — Staff Tool Prototype  (Tablet-optimised layout)
     Sidebar + main content two-column layout for iPad/tablet.
     =================================================================== */

  :root{
    --charcoal:   #1e2019;
    --terracotta: #c1604a;
    --cream:      #f5f0e8;
    --warm-white: #faf7f2;
    --text-dark:  #1a1a18;
    --text-mid:   #4a4a42;
    --text-light: #8a8a80;
    --sidebar-w:  240px;
  }

  *{ box-sizing: border-box; touch-action: pan-x pan-y; }
  html{ margin:0; padding:0; height:100%; overflow:hidden;
        -webkit-text-size-adjust: 100%; }
  body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{
    background: var(--charcoal);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }
  button, input, select, textarea{ font-family: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible,
  textarea:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--cream); outline-offset: 2px;
  }

  .display{ font-family:'Bebas Neue', sans-serif; letter-spacing:0.04em; }
  .subtext { font-family:'Cormorant Garamond', serif; font-style:italic; }

  /* ── App shell ─────────────────────────────────────────────── */
  .app-shell{
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────────────────────────── */
  .sidebar{
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: #161712;
    border-right: 1px solid rgba(245,240,232,0.08);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 30;
    transition: width 0.22s ease;
  }
  .sidebar.collapsed{
    width: 52px;
  }
  .sidebar.collapsed .sidebar-brand-text,
  .sidebar.collapsed .role-seg,
  .sidebar.collapsed .sidebar-nav,
  .sidebar.collapsed .sidebar-footer{ display: none; }
  .sidebar.collapsed .sidebar-brand{ justify-content: center; padding: 16px 8px; }

  .sidebar-toggle-btn{
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; flex-shrink: 0;
    background: none; border: none; border-radius: 8px;
    color: var(--text-light); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-toggle-btn:hover{ background: rgba(245,240,232,0.08); color: var(--cream); }
  .sidebar-toggle-btn svg{ width: 17px; height: 17px; }

  .sidebar-brand{
    display: flex; align-items: center; gap: 10px;
    padding: 20px 16px 16px;
    border-bottom: 1px solid rgba(245,240,232,0.08);
  }
  .staff-wordmark{ font-size:26px; color:var(--terracotta); line-height:1; }
  .staff-wordmark-sub{ font-size:12px; color:var(--text-light); margin-top:3px; }

  /* role toggle */
  .role-seg{
    margin: 18px 16px 0;
    display:flex;
    background: rgba(245,240,232,0.06);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .role-seg button{
    flex:1; background:transparent; border:none;
    border-radius: 9px; padding:12px 6px;
    min-height: 44px; font-size:14px; font-weight:700;
    color: var(--text-light); cursor:pointer;
    transition: background 0.15s, color 0.15s;
  }
  .role-seg button.active{
    background: var(--terracotta); color: var(--cream);
  }

  /* sidebar nav links (admin only) */
  .sidebar-nav{
    margin-top: 24px;
    flex: 1;
  }
  .sidebar-nav-label{
    font-size:10px; font-weight:700; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--text-light);
    padding: 0 20px; margin-bottom:6px;
  }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding: 13px 20px;
    font-size:15px; font-weight:600; color:var(--text-light);
    cursor:pointer; border:none; background:none;
    width:100%; text-align:left;
    border-radius: 0;
    transition: color 0.15s, background 0.15s;
  }
  .nav-item svg{ width:18px; height:18px; flex-shrink:0; opacity:0.6; }
  .nav-item:hover{ color:var(--cream); background:rgba(245,240,232,0.04); }
  .nav-item.active{
    color:var(--cream); background:rgba(193,96,74,0.14);
    border-right: 3px solid var(--terracotta);
  }
  .nav-item.active svg{ opacity:1; }

  /* reset button at sidebar bottom */
  .sidebar-footer{
    padding: 16px;
    border-top: 1px solid rgba(245,240,232,0.08);
  }
  .reset-btn{
    background: rgba(245,240,232,0.06);
    border: 1px solid rgba(245,240,232,0.14);
    border-radius: 10px;
    color: var(--text-light);
    font-size:13px; font-weight:700;
    padding: 11px 14px; width:100%;
    min-height:44px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition: color 0.15s, background 0.15s;
  }
  .reset-btn:hover{ color:var(--cream); background:rgba(245,240,232,0.1); }
  .reset-btn svg{ width:14px; height:14px; }
  /* phone-reset only visible on phone; tablet uses sidebar-footer reset */
  .phone-reset{ display:none; width:auto; min-width:40px; padding:0 11px; border-radius:10px; }

  /* ── Main content area ──────────────────────────────────────── */
  .main-content{
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .main-topbar{
    padding: 20px 28px 14px;
    border-bottom: 1px solid rgba(245,240,232,0.07);
    flex-shrink: 0;
  }
  .main-topbar-title{ font-size:28px; color:var(--cream); line-height:1; }
  .main-topbar-sub{ font-size:14px; color:var(--text-light); margin-top:3px; }

  .view{ display:none; flex-direction:column; flex:1; }
  .view.active{ display:flex; }

  /* ── KANBAN ─────────────────────────────────────────────────── */
  .kanban-wrap{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 20px 28px 28px;
    flex: 1;
    align-items: start;
    overflow-y: auto;
  }
  .kanban-hint{ display:none; } /* not needed — all cols visible */

  .kanban-col{
    background: rgba(245,240,232,0.03);
    border: 1px solid rgba(245,240,232,0.09);
    border-radius: 14px;
    padding-bottom: 10px;
    min-height: 200px;
  }
  .kanban-col-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid rgba(245,240,232,0.09);
  }
  .kanban-col-title{ font-size:20px; color:var(--cream); }
  .kanban-col-count{
    background: var(--terracotta); color:var(--cream);
    border-radius: 12px; padding:2px 9px;
    font-size:12px; font-weight:700; min-width:22px; text-align:center;
  }
  .col-empty{
    padding: 28px 16px; text-align:center;
    color:var(--text-light); font-size:13px;
  }

  .order-card{
    margin: 10px 10px;
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.13);
    border-radius: 12px;
    padding: 13px 14px;
    transition: background 0.25s, border-color 0.25s;
  }
  .order-card.urgent{}

  /* Top meta bar: order number (small) + badges + urgent flag */
  .order-card-top{
    display:flex; align-items:center;
    justify-content:space-between; gap:8px;
    margin-bottom: 10px;
  }
  .order-card-top-left{
    display:flex; align-items:center; gap:6px; flex:1; min-width:0;
  }
  /* Order number is now a small label, not the hero */
  .order-number{
    font-size:12px; font-weight:700; letter-spacing:0.06em;
    color: var(--text-light); white-space:nowrap;
    text-transform:uppercase;
  }
  .urgent-flag{
    display:inline-flex; align-items:center; justify-content:center;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.4);
    border-radius:6px; padding:5px; flex-shrink:0;
  }
  .urgent-flag svg{ width:13px; height:13px; flex-shrink:0; display:block; }
  .member-badge{
    display:inline-flex; align-items:center; justify-content:center;
    background:rgba(52,168,83,0.22); border:1px solid rgba(52,168,83,0.55);
    border-radius:6px; padding:4px 5px;
  }
  .member-badge svg{ width:12px; height:12px; fill:#4ade80; flex-shrink:0; display:block; }

  /* Items list — the hero of the card */
  .order-items-list{
    list-style: none; margin:0; padding:0;
    display:flex; flex-direction:column; gap:6px;
  }
  .order-item-row-wrap{ display:flex; flex-direction:column; gap:3px; }
  .order-item-row{
    display:flex; align-items:center; gap:10px;
  }
  .order-item-qty{
    font-size:13px; font-weight:700; letter-spacing:0.03em;
    color: var(--terracotta); line-height:1;
    flex-shrink:0; min-width:16px; text-align:right;
  }
  .order-item-name{
    font-size:15px; font-weight:700; color: var(--cream); line-height:1.15;
  }

  /* Item crossed-out state (reflected on kanban card from detail screen) */
  .item-done .order-item-name,
  .item-done .order-item-qty{ text-decoration:line-through; opacity:0.35; }
  .item-done .order-subtext{ opacity:0.25; }

  /* Per-item prep note — indented to sit under the item name, past the qty column */
  .order-subtext{
    margin-left: 26px;
    background: rgba(245,240,232,0.06);
    border-left: 3px solid rgba(245,240,232,0.2);
    border-radius: 0 5px 5px 0;
    padding: 4px 9px;
    font-size:12px; font-weight:600;
    color: rgba(245,240,232,0.5);
    line-height:1.4;
  }

  .order-card-body{ cursor:pointer; }
  .order-card-actions{
    display:flex; gap:7px; margin-top:12px;
    padding-top:10px; border-top:1px solid rgba(245,240,232,0.07);
  }

  /* ── LOCK CONTROL ───────────────────────────────────────────── */
  .queue-topbar-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }

  /* Outer wrapper: flanking labels + slider track */
  .lock-slider-wrap{
    display:flex; align-items:center; gap:8px; flex-shrink:0; user-select:none;
  }
  .lock-slider-label{
    font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    color: var(--text-light); white-space:nowrap;
    transition: color 0.2s;
  }
  .lock-slider-label.locked{ color: #e8c587; }

  /* Flanking state labels */
  .lock-end-label{
    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    white-space:nowrap; transition: opacity 0.2s, color 0.2s;
    pointer-events:none;
  }
  .lock-end-label.left { color: var(--text-light); opacity:1; }
  .lock-end-label.right{ color: rgba(212,160,23,0.8); opacity:0.35; }
  .lock-end-label.left.locked  { opacity:0.35; }
  .lock-end-label.right.locked { opacity:1; }

  /* The track */
  .lock-track{
    position: relative;
    width: 110px; height: 36px;
    background: rgba(245,240,232,0.07);
    border: 1px solid rgba(245,240,232,0.16);
    border-radius: 18px;
    cursor: grab;
    touch-action: none;
    overflow: hidden;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .lock-track.locked{
    background: rgba(212,160,23,0.12);
    border-color: rgba(212,160,23,0.4);
  }
  .lock-track.dragging{ cursor: grabbing; }

  /* Fill that grows as you drag */
  .lock-track-fill{
    position:absolute; inset:0; right:auto;
    width: 0%;
    background: rgba(212,160,23,0.18);
    border-radius: 18px;
    transition: width 0.15s ease;
    pointer-events: none;
  }

  /* Thumb */
  .lock-thumb{
    position:absolute; top:3px;
    width: 30px; height: 28px;
    background: var(--cream);
    border-radius: 14px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    transition: background 0.2s, left 0.15s ease;
    pointer-events: none;
  }
  .lock-thumb.locked{ background: #e8c587; }
  .lock-thumb svg{ width:13px; height:13px; flex-shrink:0; }
  .lock-thumb.locked svg{ stroke: #5a3e00; }

  .lock-banner{
    display:none; align-items:center; justify-content:center; gap:8px;
    background: rgba(212,160,23,0.08);
    border-bottom: 1px solid rgba(212,160,23,0.2);
    padding: 8px 28px;
    font-size:12px; color:#e8c587; font-weight:700;
    letter-spacing:0.04em; text-transform:uppercase;
    flex-shrink:0;
  }
  .lock-banner.show{ display:flex; }
  .lock-banner svg{ width:13px; height:13px; flex-shrink:0; }

  /* When locked: hide action buttons on cards, mute card cursor */
  .queue-locked .order-card-actions{ display:none; }
  .queue-locked .order-card-body{ cursor:default; }
  .order-btn-back{
    flex:1; background:transparent; border:1px solid rgba(245,240,232,0.28);
    color:var(--cream); border-radius:9px; padding:9px 4px;
    font-size:12px; font-weight:700; min-height:40px; cursor:pointer;
  }
  .order-btn-advance{
    flex:1; background:var(--terracotta); border:none;
    color:var(--cream); border-radius:9px; padding:9px 4px;
    font-size:12px; font-weight:700; min-height:40px; cursor:pointer;
  }

  /* ── MEMBERS ────────────────────────────────────────────────── */
  .members-content{ padding: 20px 28px; max-width: 700px; }
  .members-search-wrap{ margin-bottom:16px; }
  .fake-input{
    background:rgba(245,240,232,0.07); border:1px solid rgba(245,240,232,0.18);
    border-radius:8px; padding:12px 14px; font-size:15px;
    color:var(--cream); width:100%;
  }
  .fake-input::placeholder{ color:var(--text-light); }
  .fake-textarea{
    background:rgba(245,240,232,0.07); border:1px solid rgba(245,240,232,0.18);
    border-radius:8px; padding:12px 14px; font-size:14px;
    color:var(--cream); width:100%; min-height:70px; resize:vertical;
  }
  .member-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:rgba(245,240,232,0.05); border:1px solid rgba(245,240,232,0.12);
    border-radius:12px; padding:15px 18px; margin-bottom:10px;
  }
  .member-name{ font-size:16px; font-weight:700; color:var(--cream); }
  .member-meta-line{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:6px; }
  .status-pill{ font-size:11px; font-weight:700; letter-spacing:0.03em; border-radius:6px; padding:3px 9px; }
  .status-active { background:rgba(143,174,110,0.18); color:#bcd6a0; border:1px solid rgba(143,174,110,0.4); }
  .status-paused { background:rgba(212,162,76,0.18);  color:#e8c587;  border:1px solid rgba(212,162,76,0.4); }
  .status-canceled{ background:rgba(138,138,128,0.18);color:#bdbdb2; border:1px solid rgba(138,138,128,0.35);}
  .founding-tag{ font-size:12px; color:var(--terracotta); font-weight:700; }
  .join-date{ font-size:12px; color:var(--text-light); }
  .edit-btn{
    width:40px; height:40px; min-width:40px; border-radius:50%;
    background:rgba(245,240,232,0.08); border:1px solid rgba(245,240,232,0.18);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .edit-btn svg{ width:15px; height:15px; }
  .no-results{ padding:40px; text-align:center; color:var(--text-light); font-size:15px; }

  /* ── EVENTS ─────────────────────────────────────────────────── */
  .events-content{ padding:20px 28px; max-width:760px; }
  .field-label{
    font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--text-light); margin-bottom:6px; display:block;
  }
  .field{ margin-bottom:12px; }
  .btn-primary{
    display:block; width:100%;
    background:var(--terracotta); color:var(--cream);
    border:none; border-radius:12px;
    padding:14px; font-size:15px; font-weight:700;
    min-height:48px; cursor:pointer; text-align:center;
  }
  .btn-secondary{
    display:block; width:100%;
    background:transparent; color:var(--cream);
    border:1px solid rgba(245,240,232,0.35);
    border-radius:12px; padding:12px; font-size:14px; font-weight:500;
    min-height:48px; cursor:pointer; text-align:center;
  }
  .create-toggle{
    width:100%; background:rgba(245,240,232,0.05);
    border:1px dashed rgba(245,240,232,0.28); color:var(--cream);
    border-radius:12px; padding:14px; font-size:15px; font-weight:700;
    cursor:pointer; min-height:48px; margin-bottom:14px;
  }
  .create-form-card{
    background:rgba(245,240,232,0.04); border:1px solid rgba(245,240,232,0.14);
    border-radius:12px; padding:20px; display:none; margin-bottom:20px;
  }
  .create-form-card.open{ display:block; }
  .form-row{ display:flex; gap:12px; }
  .form-row .field{ flex:1; }

  .event-admin-card{
    background:rgba(245,240,232,0.05); border:1px solid rgba(245,240,232,0.13);
    border-radius:12px; padding:18px; margin-bottom:14px;
  }
  .event-title{ font-size:19px; font-weight:700; color:var(--cream); }
  .event-datetime{ font-size:13px; color:var(--terracotta); font-weight:700; margin-top:3px; }
  .event-desc{ font-size:14px; color:var(--text-light); margin-top:8px; line-height:1.5; }
  .window-row{
    margin-top:12px; border-top:1px solid rgba(245,240,232,0.1);
    padding-top:10px; display:flex; flex-direction:column; gap:5px;
  }
  .window-line{ font-size:13px; color:var(--cream); display:flex; gap:8px; }
  .window-line .lbl{ color:var(--text-light); min-width:96px; }
  .window-open{ color:#bcd6a0; font-weight:700; }
  .window-pending{ color:#e8c587; font-weight:700; }
  .rsvp-toggle{
    margin-top:12px; background:none; border:none; color:var(--cream);
    font-size:13px; font-weight:700; cursor:pointer;
    padding:4px 0; display:flex; align-items:center; gap:5px;
  }
  .rsvp-toggle .chev{ transition:transform 0.2s ease; }
  .rsvp-toggle.open .chev{ transform:rotate(90deg); }
  .rsvp-list{ max-height:0; overflow:hidden; transition:max-height 0.25s ease; }
  .rsvp-list.open{ max-height:260px; }
  .rsvp-list ul{ margin:8px 0 0; padding-left:20px; }
  .rsvp-list li{ font-size:13px; color:var(--text-light); margin-bottom:4px; }
  .rsvp-empty{ font-size:13px; color:var(--text-light); margin-top:8px; font-style:italic; }
  .gated-msg{ margin:60px auto; text-align:center; color:var(--text-light); font-size:15px; line-height:1.6; max-width:340px; }
  .gated-msg .display{ font-size:22px; color:var(--cream); display:block; margin-bottom:10px; }

  /* ── MODAL ──────────────────────────────────────────────────── */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.65);
    display:none; align-items:center; justify-content:center;
    z-index:200; padding:32px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:#23241e; border:1px solid rgba(245,240,232,0.15);
    border-radius:18px; padding:0;
    width:100%; max-width:520px; max-height:85vh; overflow-y:auto;
  }
  .modal.centered{
    max-width:420px; border-radius:14px; padding:24px;
  }
  .modal-drag-handle{ display:none; } /* not needed on tablet */
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 24px 16px;
    border-bottom:1px solid rgba(245,240,232,0.08);
  }
  .modal-order-num{ font-size:28px; color:var(--cream); }
  .modal-close-btn{
    background:rgba(245,240,232,0.08); border:none;
    color:var(--cream); border-radius:50%;
    width:36px; height:36px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; line-height:1;
  }
  .modal-section{ padding:18px 24px; border-bottom:1px solid rgba(245,240,232,0.07); }
  .modal-section:last-child{ border-bottom:none; }
  .modal-label{
    font-size:10px; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--text-light); margin-bottom:9px;
  }
  .modal-order-meta-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .modal-type-badge{
    font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;

  /* ── TOAST ──────────────────────────────────────────────────── */
  .toast{
    position:fixed; left:50%; bottom:32px;
    transform:translateX(-50%) translateY(20px);

    padding:13px 24px; border-radius:30px;
    font-size:15px; font-weight:700;
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:300; max-width:440px; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .hidden{ display:none !important; }

  /* phone-reset hidden on tablet; sidebar-footer reset is used instead */
  @media (min-width: 768px) {
    .phone-reset{ display:none !important; }

  @media (max-width: 767px) {
    .sidebar-toggle-btn{ display:none !important; }

  /* ================================================================

     everything to a single-column, top-header, swipe-kanban layout.
     ================================================================ */
  @media (max-width: 767px) {

    html, body { height: auto; overflow: auto; }

    .app-shell{
      flex-direction: column;
      height: auto;

    /* Hide reset button — saves header space on phone */

    /* Main content: natural document flow */

      flex: none;
    }
    .main-topbar{
      padding: 14px 18px 10px;
    }
    .main-topbar-title{ font-size: 22px; }
    .main-topbar-sub{ font-size: 13px; }

    .member-row{ margin: 0 18px 10px; }

    /* Modal: bottom sheet */

<script>
// =====================================================================
// DATA — seed functions (called fresh on load and on Reset Demo)
// =====================================================================

const STATUSES = ['received','preparing','ready','completed'];
const STATUS_LABELS = { received:'Received', preparing:'Preparing', ready:'Ready for Pickup', completed:'Completed' };

// DEMO: urgency is a static flag on each order rather than a live timer,
// so exactly one card illustrates the running-long state at all times.
// In production this would be driven by a real elapsed-time threshold.

function seedOrders(){
  return [
    { id:'o1046', number:'1046',
      items:[

        {name:'Bottled Cold Press', qty:1, notes:[]}

      items:[
        {name:'Granola Bowl', qty:1, notes:['No nuts']}
      ],
      orderType:'dinein', timeLabel:'10:58 AM', status:'received', memberId:null,

    { id:'o1043', number:'1043',
      items:[
        {name:'Breakfast Sandwich',  qty:2, notes:['No onion']},
        {name:'Market Salad',        qty:3, notes:['Dressing on the side']},
        {name:'Turkey Club',         qty:2, notes:[]},
        {name:'Avocado Toast',       qty:1, notes:['Extra chili flakes']},
        {name:'Granola Bowl',        qty:2, notes:['No nuts', 'Extra honey']},
        {name:'Salus Latte',         qty:4, notes:['Oat milk']},
        {name:'Cold Brew',           qty:2, notes:['Extra ice']},
        {name:'Sparkling Lemonade',  qty:3, notes:[]},
        {name:'Bottled Cold Press',  qty:2, notes:[]},
        {name:'Cortado',             qty:1, notes:['Almond milk']},
      ],
      orderType:'carryout', timeLabel:'10:51 AM', status:'preparing', memberId:'m2',
      urgent: true },
    { id:'o1041', number:'1041',
      items:[
        {name:'Turkey Club',        qty:1, notes:[]},
        {name:'Sparkling Lemonade', qty:1, notes:[]}
      ],
      orderType:'dinein', timeLabel:'10:44 AM', status:'preparing', memberId:null,
      urgent: false },
    { id:'o1039', number:'1039',
      items:[
        // Two Cold Brews with different prep — split into two line items
        {name:'Cold Brew', qty:1, notes:['Extra ice']},
        {name:'Cold Brew', qty:1, notes:['No ice']}
      ],
      orderType:'carryout', timeLabel:'10:36 AM', status:'ready', memberId:'m1',
      urgent: false },
    { id:'o1038', number:'1038',
      items:[
        {name:'Cortado',      qty:1, notes:[]},
        {name:'Avocado Toast', qty:1, notes:[]}
      ],
      orderType:'dinein', timeLabel:'10:20 AM', status:'completed', memberId:null,
      urgent: false },
  ];
}

function seedMembers(){
  return [
    { id:'m1', name:'Maria Chen', status:'active', founding:false, foundingNumber:null, joinDate:'Apr 14, 2026' },
    { id:'m2', name:'James Okafor', status:'active', founding:true, foundingNumber:11, joinDate:'Feb 9, 2026' },
    { id:'m3', name:'Priya Patel', status:'active', founding:false, foundingNumber:null, joinDate:'May 20, 2026' },
    { id:'m4', name:'Tom Reilly', status:'paused', founding:false, foundingNumber:null, joinDate:'Mar 1, 2026' },
    { id:'m5', name:'Aisha Bello', status:'active', founding:true, foundingNumber:47, joinDate:'Feb 28, 2026' },
    { id:'m6', name:'Daniel Voss', status:'canceled', founding:false, foundingNumber:null, joinDate:'Jan 18, 2026' },
  ];
}

// Mirrors the placeholder events used in salus-customer-prototype.html
// so the demo feels connected across both apps.
function seedEvents(){
  return [
    { id:'coffee-tasting', title:'Community Coffee Tasting', datetime:'Sat, Jul 12 · 10:00 AM',
      desc:'Sample small-batch coffees from three local roasters and meet your neighbors.',
      memberWindowLabel:'Open now', publicWindowOpen:false, publicWindowLabel:'Opens in 2 days',
      rsvps:['Maria Chen','James Okafor','Aisha Bello'] },
    { id:'sunset-acoustic', title:'Sunset Acoustic Set', datetime:'Fri, Jul 18 · 6:30 PM',
      desc:'Live local music on the patio — evening menu open for the night.',
      memberWindowLabel:'Open now', publicWindowOpen:true, publicWindowLabel:'Open now',
      rsvps:['Priya Patel','James Okafor','Sam Carter'] },
    { id:'founders-supper', title:"Founders' Supper Club", datetime:'Thu, Jul 31 · 6:00 PM',
      desc:"A small seated dinner celebrating the people building Salus Market from day one.",
      memberWindowLabel:'Open now', publicWindowOpen:false, publicWindowLabel:'Opens in 5 days',
      rsvps:['James Okafor','Aisha Bello'] },
  ];
}

// =====================================================================
// STATE
// =====================================================================
let state = {
  role: 'staff',
  activeTab: 'queue',
  orders: [],
  members: [],
  events: [],
  memberSearch: '',
  expandedEvents: {},
  editingMemberId: null,
  createFormOpen: false,
  queueLocked: false,
  completedItems: {},
};

function resetDemo(){
  state.orders = seedOrders();
  state.members = seedMembers();
  state.events = seedEvents();
  state.memberSearch = '';
  state.expandedEvents = {};
  state.editingMemberId = null;
  state.createFormOpen = false;
  state.queueLocked = false;
  state.completedItems = {};
  document.getElementById('member-search').value = '';
  closeModal();
  renderAll();
  // Reset slider to unlocked position
  const track = document.getElementById('lock-track');
  if(track) applyLockState(false, true);
  toast('Demo data reset');
}

// =====================================================================
// NAVIGATION
// =====================================================================
function setRole(role){
  state.role = role;
  if(role === 'staff' && state.activeTab !== 'queue'){
    state.activeTab = 'queue';
  }
  renderAll();
}

function setTab(tab){
  if(tab === 'events' && state.role !== 'admin') return; // gated — staff can't open this tab
  state.activeTab = tab;
  renderAll();
}

// =====================================================================
// ORDER QUEUE
// =====================================================================
function formatItems(items){
  return items.map(i => `${i.name} ×${i.qty}`).join(', ');
}

function isUrgent(order){
  return !!order.urgent;
}

function advanceOrder(id){
  const o = state.orders.find(x => x.id === id);
  const idx = STATUSES.indexOf(o.status);
  if(idx < STATUSES.length - 1){ o.status = STATUSES[idx + 1]; }
  renderQueue();
}
function backOrder(id){
  const o = state.orders.find(x => x.id === id);
  const idx = STATUSES.indexOf(o.status);
  if(idx > 0){ o.status = STATUSES[idx - 1]; }
  renderQueue();
}

function memberFor(id){ return state.members.find(m => m.id === id) || null; }

// =====================================================================
// QUEUE LOCK — drag slider
// =====================================================================
(function(){
  const TRACK_W   = 110;
  const THUMB_W   = 30;
  const THUMB_PAD = 3;
  const TRAVEL    = TRACK_W - THUMB_W - THUMB_PAD * 2; // 44px
  const COMMIT_THRESHOLD = 0.55; // fraction of travel required to commit

  let dragging = false;
  let startX   = 0;
  let startLeft = 0; // px position at drag start

  function thumbLeft(locked){ return locked ? TRAVEL : 0; }

  function applyLockState(locked, animate){
    const track    = document.getElementById('lock-track');
    const thumb    = document.getElementById('lock-thumb');
    const fill     = document.getElementById('lock-track-fill');
    const lUnlock  = document.getElementById('lock-label-unlock');
    const lLock    = document.getElementById('lock-label-lock');
    const iUnlocked = document.getElementById('lock-icon-unlocked');
    const iLocked   = document.getElementById('lock-icon-locked');

    const left = thumbLeft(locked);
    const pct  = (left / TRAVEL) * 100;

    thumb.style.transition  = animate ? 'left 0.2s ease, background 0.2s' : 'none';
    fill.style.transition   = animate ? 'width 0.2s ease' : 'none';

    thumb.style.left  = (THUMB_PAD + left) + 'px';
    fill.style.width  = pct + '%';

    track.classList.toggle('locked', locked);
    thumb.classList.toggle('locked', locked);

    // Flanking labels: active state is full opacity, inactive is dim
    lUnlock.classList.toggle('locked', locked);
    lLock.classList.toggle('locked', locked);

    iUnlocked.style.display = locked ? 'none' : '';
    iLocked.style.display   = locked ? '' : 'none';

    track.setAttribute('aria-checked', String(locked));

    // Kanban queue state
    document.getElementById('lock-banner').classList.toggle('show', locked);
    document.getElementById('kanban-wrap').classList.toggle('queue-locked', locked);
    if(locked) closeModal();
  }

  function commitLock(locked){
    state.queueLocked = locked;
    applyLockState(locked, true);
    toast(locked ? 'Queue locked — view only' : 'Queue unlocked');
  }

  function getClientX(e){ return e.touches ? e.touches[0].clientX : e.clientX; }

  function onStart(e){
    // Keyboard: space/enter toggles
    if(e.type === 'keydown'){
      if(e.key === ' ' || e.key === 'Enter'){
        e.preventDefault();
        commitLock(!state.queueLocked);
      }
      return;
    }
    e.preventDefault();
    dragging = true;
    startX    = getClientX(e);
    startLeft = thumbLeft(state.queueLocked);
    const track = document.getElementById('lock-track');
    track.classList.add('dragging');

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup',   onEnd);
    document.addEventListener('touchend',  onEnd);
  }

  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const dx      = getClientX(e) - startX;
    const rawLeft = Math.min(TRAVEL, Math.max(0, startLeft + dx));
    const pct     = (rawLeft / TRAVEL) * 100;

    const thumb = document.getElementById('lock-thumb');
    const fill  = document.getElementById('lock-track-fill');
    thumb.style.transition = 'none';
    fill.style.transition  = 'none';
    thumb.style.left = (THUMB_PAD + rawLeft) + 'px';
    fill.style.width = pct + '%';
  }

  function onEnd(e){
    if(!dragging) return;
    dragging = false;
    const track = document.getElementById('lock-track');
    track.classList.remove('dragging');

    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup',   onEnd);
    document.removeEventListener('touchend',  onEnd);

    // Determine current thumb position from its style
    const thumb   = document.getElementById('lock-thumb');
    const curLeft = parseFloat(thumb.style.left) - THUMB_PAD;
    const frac    = curLeft / TRAVEL;

    // Commit if past threshold in the intended direction
    let shouldLock = state.queueLocked;
    if(!state.queueLocked && frac >= COMMIT_THRESHOLD)  shouldLock = true;
    if( state.queueLocked && frac <= 1 - COMMIT_THRESHOLD) shouldLock = false;

    commitLock(shouldLock);
  }

  // Wire up events (inline script, DOM already parsed)
  (function wireSlider(){
    const track = document.getElementById('lock-track');
    if(!track){ return; } // guard
    track.addEventListener('mousedown',  onStart);
    track.addEventListener('touchstart', onStart, { passive: false });
    track.addEventListener('keydown',    onStart);
  })();

  // Expose for use by resetDemo
  window.applyLockState = applyLockState;
})();


function renderQueue(){
  // Sync lock visual state on every render
  const locked = state.queueLocked;
  document.getElementById('kanban-wrap').classList.toggle('queue-locked', locked);

  let html = '';
  STATUSES.forEach((status, idx) => {
    const colOrders = state.orders
      .filter(o => o.status === status)
      .sort((a,b) => a.placedAtMs - b.placedAtMs); // oldest first

    let cardsHtml = '';
    if(colOrders.length === 0){
      cardsHtml = `<div class="col-empty">No orders here right now.</div>`;
    } else {
      colOrders.forEach(o => {
        const urgent = isUrgent(o);
        const member = memberFor(o.memberId);
        const starIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
        const personIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;
        const memberBadge = member
          ? `<div class="member-badge">${member.founding ? starIcon : personIcon}</div>`
          : '';
        const backHtml = idx > 0
          ? `<button class="order-btn-back" onclick="backOrder('${o.id}')">← ${STATUS_LABELS[STATUSES[idx-1]]}</button>`
          : '';
        const advanceHtml = idx < STATUSES.length - 1
          ? `<button class="order-btn-advance" onclick="advanceOrder('${o.id}')">${STATUS_LABELS[STATUSES[idx+1]]} →</button>`
          : '';

        // Build items list — each item on its own line with its own notes beneath
        const itemsListHtml = o.items.map((i, idx) => {
          const done = !!state.completedItems[o.id + ':' + idx];
          const noteHtml = (i.notes && i.notes.length)
            ? `<div class="order-subtext">⚑ ${i.notes.join(' · ')}</div>`
            : '';
          return `<li class="order-item-row-wrap${done ? ' item-done' : ''}">
            <div class="order-item-row">
              <span class="order-item-qty">${i.qty}×</span>
              <span class="order-item-name">${i.name}</span>
            </div>
            ${noteHtml}
          </li>`;
        }).join('');

        // Urgent flag — icon only
        const urgentHtml = urgent
          ? `<div class="urgent-flag"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#d4a017" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></div>`
          : '';

        // Card body opens detail only when unlocked
        const bodyClick = locked ? '' : `onclick="openOrderDetail('${o.id}')"`;

        cardsHtml += `
          <div class="order-card ${urgent ? 'urgent' : ''}">
            <div class="order-card-body" ${bodyClick}>
              <div class="order-card-top">
                <div class="order-card-top-left">
                  <span class="order-number">#${o.number} / ${o.orderType === 'carryout' ? 'Carry-Out' : 'Dine-In'}</span>
                  ${memberBadge}
                </div>
                ${urgentHtml}
              </div>
              <ul class="order-items-list">${itemsListHtml}</ul>
            </div>
            <div class="order-card-actions">${backHtml}${advanceHtml}</div>
          </div>`;
      });
    }

    html += `
      <div class="kanban-col">
        <div class="kanban-col-head">
          <div class="kanban-col-title display">${STATUS_LABELS[status]}</div>
          <div class="kanban-col-count">${colOrders.length}</div>
        </div>
        ${cardsHtml}
      </div>`;
  });
  document.getElementById('kanban-wrap').innerHTML = html;
}

// =====================================================================
// MEMBER LOOKUP
// =====================================================================
function onMemberSearch(val){
  state.memberSearch = val;
  renderMembers();
}

function openOrderDetail(id){
  const o = state.orders.find(x => x.id === id);
  const member = memberFor(o.memberId);
  const urgent = isUrgent(o);
  const statusIdx = STATUSES.indexOf(o.status);

  const starIcon = `<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  const personIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;

  const memberSection = member ? `
    <div class="modal-section">
      <div class="modal-label">Member</div>
      <div class="modal-member-block">
        <div class="modal-member-icon">${member.founding ? starIcon : personIcon}</div>
        <div>
          <div class="modal-member-name">${member.name}</div>
          <div class="modal-member-sub">${member.founding ? `Founding Member No. ${member.foundingNumber}` : 'Member'} · Free drip coffee applied</div>
        </div>
      </div>
    </div>` : '';

  const notesSection = ''; // notes now live per-item, shown in the items list below

  const itemsHtml = o.items.map((i, idx) => {
    const done = !!state.completedItems[o.id + ':' + idx];
    const noteHtml = (i.notes && i.notes.length)
      ? `<div style="font-size:12px;color:rgba(245,240,232,0.5);margin-top:3px;border-left:2px solid rgba(245,240,232,0.2);padding-left:6px;">⚑ ${i.notes.join(' · ')}</div>`
      : '';
    const doneStyle = done ? 'opacity:0.35;' : '';
    const strikeStyle = done ? 'text-decoration:line-through;' : '';
    return `<li style="flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;user-select:none;${doneStyle}" onclick="toggleItemDone('${o.id}',${idx})">
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
        <span style="${strikeStyle}">${i.name}</span>
        <span class="modal-item-qty" style="${strikeStyle}">×${i.qty}</span>
      </div>
      ${noteHtml}
    </li>`;
  }).join('');

  const urgentHtml = urgent ? `<div class="urgent-flag" style="margin-left:8px;"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:13px;height:13px;fill:none;stroke:#d4a017;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block;"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></div>` : '';

  const actionsRow = state.queueLocked ? '' : (() => {
    const backHtml = statusIdx > 0
      ? `<button class="order-btn-back" onclick="detailBackOrder('${o.id}')">← ${STATUS_LABELS[STATUSES[statusIdx-1]]}</button>`
      : '';
    const advanceHtml = statusIdx < STATUSES.length - 1
      ? `<button class="order-btn-advance" onclick="detailAdvanceOrder('${o.id}')">${STATUS_LABELS[STATUSES[statusIdx+1]]} →</button>`
      : '';
    return `<div class="modal-actions-row">${backHtml}${advanceHtml}</div>`;
  })();

  const modal = document.getElementById('modal-content');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-drag-handle"></div>
    <div class="modal-header">
      <div style="display:flex;align-items:center;">
        <div class="modal-order-num display">#${o.number}</div>
        ${urgentHtml}
      </div>
      <button class="modal-close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-section">
      <div class="modal-label">Order details</div>
      <div class="modal-order-meta-row">
        <span class="modal-type-badge">${o.orderType === 'carryout' ? 'Carry-Out' : 'Dine-In'}</span>
        <span class="modal-time">Placed ${o.timeLabel}</span>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Items</div>
      <ul class="modal-items-list">${itemsHtml}</ul>
    </div>
    ${memberSection}
    ${notesSection}
    <div class="modal-section">
      <div class="modal-label">Status</div>
      <div class="modal-status-row">
        <div class="modal-status-dot ${o.status}"></div>
        <div class="modal-status-label">${STATUS_LABELS[o.status]}</div>
      </div>
    </div>
    ${actionsRow}`;

  const overlay = document.getElementById('modal-overlay');
  overlay.className = 'modal-overlay show';
}

function detailAdvanceOrder(id){
  const o = state.orders.find(x => x.id === id);
  const idx = STATUSES.indexOf(o.status);
  if(idx < STATUSES.length - 1){ o.status = STATUSES[idx + 1]; }
  renderQueue();
  openOrderDetail(id); // refresh modal
}

function detailBackOrder(id){
  const o = state.orders.find(x => x.id === id);
  const idx = STATUSES.indexOf(o.status);
  if(idx > 0){ o.status = STATUSES[idx - 1]; }
  renderQueue();
  openOrderDetail(id); // refresh modal
}

function openEditMember(id){
  state.editingMemberId = id;
  const m = memberFor(id);
  const modal = document.getElementById('modal-content');
  modal.className = 'modal centered';
  modal.innerHTML = `
    <div class="modal-title display">Edit ${m.name}</div>
    <div class="field">
      <label class="field-label">Subscription status</label>
      <select class="fake-input" id="edit-status">
        <option value="active" ${m.status==='active'?'selected':''}>Active</option>
        <option value="paused" ${m.status==='paused'?'selected':''}>Paused</option>
        <option value="canceled" ${m.status==='canceled'?'selected':''}>Canceled</option>
      </select>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="edit-founding" ${m.founding?'checked':''} onchange="toggleFoundingField()">
      <label for="edit-founding">Founding Member</label>
    </div>
    <div class="field" id="edit-founding-num-field" style="${m.founding?'':'display:none;'}">
      <label class="field-label">Founding member No.</label>
      <input class="fake-input" id="edit-founding-num" type="number" min="1" max="100" value="${m.foundingNumber || ''}">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveMemberEdit()">Save</button>
    </div>`;
  const overlay = document.getElementById('modal-overlay');
  overlay.className = 'modal-overlay center-modal show';
}

function toggleFoundingField(){
  const checked = document.getElementById('edit-founding').checked;
  document.getElementById('edit-founding-num-field').style.display = checked ? '' : 'none';
}

function saveMemberEdit(){
  const m = memberFor(state.editingMemberId);
  m.status = document.getElementById('edit-status').value;
  m.founding = document.getElementById('edit-founding').checked;
  m.foundingNumber = m.founding ? (parseInt(document.getElementById('edit-founding-num').value, 10) || null) : null;
  closeModal();
  renderMembers();
  renderQueue(); // member badges on order cards may reference founding status
  toast('Member updated');
}

function closeModal(){
  state.editingMemberId = null;
  document.getElementById('modal-overlay').className = 'modal-overlay';
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
}

function toggleItemDone(orderId, idx){
  const key = orderId + ':' + idx;
  state.completedItems[key] = !state.completedItems[key];
  renderQueue();
  openOrderDetail(orderId);
}

function renderMembers(){
  document.getElementById('members-sub').textContent = state.role === 'admin'
    ? 'Tap the pencil to edit a record.'
    : 'Status, founding flag, and join date. Read-only.';

  const q = state.memberSearch.trim().toLowerCase();
  const list = state.members.filter(m => m.name.toLowerCase().includes(q));

  if(list.length === 0){
    document.getElementById('member-list').innerHTML = `<div class="no-results">No members match "${state.memberSearch}".</div>`;
    return;
  }

  let html = '';
  list.forEach(m => {
    const statusClass = { active:'status-active', paused:'status-paused', canceled:'status-canceled' }[m.status];
    const statusLabel = { active:'Active', paused:'Paused', canceled:'Canceled' }[m.status];
    const foundingTag = m.founding ? `<span class="founding-tag">★ Founding No. ${m.foundingNumber}</span>` : '';
    const editBtn = state.role === 'admin'
      ? `<button class="edit-btn" onclick="openEditMember('${m.id}')" aria-label="Edit ${m.name}">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
         </button>`
      : '';
    html += `
      <div class="member-row">
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-meta-line">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            ${foundingTag}
            <span class="join-date">Joined ${m.joinDate}</span>
          </div>
        </div>
        ${editBtn}
      </div>`;
  });
  document.getElementById('member-list').innerHTML = html;
}

// =====================================================================
// EVENT MANAGEMENT (admin only)
// =====================================================================
function toggleCreateForm(){
  state.createFormOpen = !state.createFormOpen;
  document.getElementById('create-form-card').classList.toggle('open', state.createFormOpen);
  document.getElementById('create-toggle-btn').textContent = state.createFormOpen ? '− Cancel' : '+ Create Event';
}

function onPublicStateChange(){
  const isOpen = document.getElementById('new-ev-publicstate').value === 'open';
  document.getElementById('new-ev-publiclabel-field').style.display = isOpen ? 'none' : '';
}

function submitNewEvent(){
  const title = document.getElementById('new-ev-title').value.trim();
  const datetime = document.getElementById('new-ev-datetime').value.trim();
  const desc = document.getElementById('new-ev-desc').value.trim();
  const memberWindowLabel = document.getElementById('new-ev-memberwindow').value.trim() || 'Open now';
  const publicOpen = document.getElementById('new-ev-publicstate').value === 'open';
  const publicWindowLabel = publicOpen ? 'Open now' : (document.getElementById('new-ev-publiclabel').value.trim() || 'TBD');

  if(!title || !datetime){
    toast('Add at least a title and date/time');
    return;
  }

  state.events.unshift({
    id: 'ev-' + Date.now(),
    title, datetime,
    desc: desc || 'No description yet.',
    memberWindowLabel,
    publicWindowOpen: publicOpen,
    publicWindowLabel,
    rsvps: [],
  });

  // reset form
  ['new-ev-title','new-ev-datetime','new-ev-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('new-ev-memberwindow').value = 'Open now';
  document.getElementById('new-ev-publicstate').value = 'pending';
  document.getElementById('new-ev-publiclabel').value = '';
  document.getElementById('new-ev-publiclabel-field').style.display = '';
  toggleCreateForm();

  renderEvents();
  toast('Event created');
}

function toggleRsvpList(id){
  state.expandedEvents[id] = !state.expandedEvents[id];
  renderEvents();
}

function renderEvents(){
  if(state.role !== 'admin'){
    document.getElementById('events-admin-area').classList.add('hidden');
    document.getElementById('events-list').innerHTML = `
      <div class="gated-msg">
        <span class="display">Admin Only</span>
        Event creation and RSVP-window management aren't visible to staff accounts. Switch to Admin to manage events.
      </div>`;
    return;
  }
  document.getElementById('events-admin-area').classList.remove('hidden');

  let html = '';
  state.events.forEach(ev => {
    const expanded = !!state.expandedEvents[ev.id];
    const rsvpListHtml = ev.rsvps.length
      ? `<ul>${ev.rsvps.map(n => `<li>${n}</li>`).join('')}</ul>`
      : `<div class="rsvp-empty">No RSVPs yet.</div>`;

    html += `
      <div class="event-admin-card">
        <div class="event-title">${ev.title}</div>
        <div class="event-datetime">${ev.datetime}</div>
        <div class="event-desc">${ev.desc}</div>
        <div class="window-row">
          <div class="window-line"><span class="lbl">Member window</span><span class="window-open">${ev.memberWindowLabel}</span></div>
          <div class="window-line"><span class="lbl">Public window</span><span class="${ev.publicWindowOpen ? 'window-open' : 'window-pending'}">${ev.publicWindowLabel}</span></div>
        </div>
        <button class="rsvp-toggle ${expanded ? 'open' : ''}" onclick="toggleRsvpList('${ev.id}')">
          <span class="chev">›</span> Who's RSVP'd (${ev.rsvps.length})
        </button>
        <div class="rsvp-list ${expanded ? 'open' : ''}">${rsvpListHtml}</div>
      </div>`;
  });
  document.getElementById('events-list').innerHTML = html;
}

// =====================================================================
// GLOBAL RENDER
// =====================================================================
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function renderRole(){
  document.getElementById('role-btn-staff').classList.toggle('active', state.role === 'staff');
  document.getElementById('role-btn-admin').classList.toggle('active', state.role === 'admin');
  const isAdmin = state.role === 'admin';
  document.getElementById('sidebar-nav').classList.toggle('hidden', !isAdmin);
}

function renderTabs(){
  ['queue','members','events'].forEach(t => {
    document.getElementById('view-' + t).classList.toggle('active', state.activeTab === t);
    document.getElementById('tab-btn-' + t).classList.toggle('active', state.activeTab === t);
  });
}

function renderAll(){
  renderRole();
  renderTabs();
  renderQueue();
  renderMembers();
  renderEvents();
}

// =====================================================================
// PREVENT PINCH-ZOOM & DOUBLE-TAP ZOOM (app-like behaviour)
// =====================================================================
document.addEventListener('touchmove', function(e){
  if(e.touches.length > 1){ e.preventDefault(); }
}, { passive: false });

let _lastTap = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now - _lastTap < 300){ e.preventDefault(); }
  _lastTap = now;
}, { passive: false });

// ---- Init ----
resetDemo();
</script>
